<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超限界突破・脳汁親ガチャ GOD MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Serif+JP:wght@900&family=Zen+Kaku+Gothic+New:wght@900&display=swap');
        
        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        .font-pachinko { font-family: 'Dela Gothic One', sans-serif; }

        .text-gold { 
            background: linear-gradient(0deg, #ffd700, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px #ff0) drop-shadow(0 0 30px #f80);
        }

        .text-rainbow {
            background: linear-gradient(90deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
            background-size: 600% 600%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 0.4s linear infinite;
        }

        @keyframes rainbow { to { background-position: 600% center; } }

        .glitch { position: relative; }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .glitch::before { left: 4px; text-shadow: -3px 0 #f00; animation: glitch1 0.1s infinite; }
        .glitch::after { left: -4px; text-shadow: 3px 0 #00f; animation: glitch2 0.13s infinite; }

        @keyframes glitch1 { 0%,100% { clip: rect(0,9999px,40px,0); } 20% { clip: rect(20px,9999px,60px,0); } }
        @keyframes glitch2 { 0%,100% { clip: rect(60px,9999px,9999px,0); } 40% { clip: rect(10px,9999px,80px,0); } }

        .shake-fatal {
            animation: fatal-shake 0.03s infinite linear;
        }
        @keyframes fatal-shake {
            0% { transform: translate(0,0) rotate(0deg); }
            10% { transform: translate(-25px,20px) rotate(-2deg); }
            20% { transform: translate(20px,-25px) rotate(2deg); }
            30% { transform: translate(-30px,15px) rotate(-3deg); }
            40% { transform: translate(25px,-20px) rotate(1deg); }
            50% { transform: translate(-20px,25px) rotate(-2deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .scanlines {
            position: fixed; inset: 0; z-index: 90; pointer-events: none;
            background: repeating-linear-gradient(transparent 0px, transparent 2px, rgba(255,255,255,0.15) 2px, rgba(255,255,255,0.15) 4px);
            animation: scan 1.2s linear infinite;
            mix-blend-mode: overlay;
        }
        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 400px; } }

        .lightning {
            position: fixed; inset: 0; z-index: 95; pointer-events: none;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, transparent 70%);
            opacity: 0; animation: lightning 0.08s infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen relative">

    <div class="scanlines"></div>
    <div id="puchun-layer" class="fixed inset-0 bg-black z-[9999] hidden"></div>
    <div id="strobe-layer" class="hidden"></div>
    <div id="flash-overlay" class="fixed inset-0 bg-white opacity-0 pointer-events-none z-50 transition-all"></div>
    <div id="lightning" class="lightning hidden"></div>
    <canvas id="particle-canvas" class="fixed inset-0 pointer-events-none z-20 hidden"></canvas>

    <!-- メインUI -->
    <div id="main-ui" class="w-full max-w-xl p-4 z-10">
        <div class="border-b-4 border-[#ff0] bg-black p-6 rounded-t-2xl text-center shadow-2xl">
            <h1 class="text-5xl md:text-7xl font-pachinko text-gold glitch" data-text="CR 超限界親ガチャ">CR 超限界親ガチャ</h1>
            <p class="text-red-500 font-mono text-sm tracking-widest">DOPAMINE BREAKER 3.0</p>
        </div>
        <div class="bg-gradient-to-b from-gray-900 to-black p-8 rounded-b-2xl border border-gray-700 space-y-6">
            <button onclick="startDraw(1)" class="w-full py-5 text-2xl font-bold border-2 border-gray-400 hover:border-white bg-gray-800 rounded-xl active:scale-95 transition-all">単発</button>
            
            <button onclick="startDraw(10)" class="w-full py-6 text-4xl font-pachinko border-4 border-red-500 bg-gradient-to-r from-red-800 to-red-600 rounded-2xl active:scale-95 shadow-xl shadow-red-500/50 hover:shadow-red-500/80 transition-all">10連 激アツ</button>
            
            <button onclick="startDraw(100)" class="w-full py-8 text-5xl font-pachinko border-4 border-purple-500 bg-black rounded-3xl active:scale-95 shadow-2xl shadow-purple-500/70 hover:shadow-purple-500/90 transition-all relative overflow-hidden group">
                <span class="relative z-10 text-rainbow">100連 脳汁崩壊</span>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent -skew-x-12 animate-[shimmer_0.8s_linear_infinite]"></div>
            </button>
        </div>
    </div>

    <!-- 抽選シアター -->
    <div id="theater-ui" class="hidden fixed inset-0 bg-black/95 z-40 flex items-center justify-center">
        <div id="cut-in-text" class="absolute z-50 text-8xl md:text-[140px] font-pachinko font-black hidden drop-shadow-[0_0_60px_#ff0]"></div>
        <div class="relative w-full max-w-lg px-4">
            <div id="counter-display" class="absolute -top-8 right-4 text-red-500 font-mono text-3xl font-black"></div>
            <div id="card-container" class="border-8 border-gray-700 bg-black rounded-3xl p-10 text-center transition-all">
                <div id="card-rank" class="text-6xl font-pachinko mb-6">WAIT</div>
                <div id="card-name" class="text-4xl font-bold mb-8 min-h-[3em]">---</div>
            </div>
        </div>
        <button onclick="skipDraw()" class="absolute bottom-8 text-red-400 border border-red-500 px-8 py-3 text-sm tracking-widest hover:bg-red-900">強制終了 SPACE</button>
    </div>

    <!-- 結果画面 -->
    <div id="result-list-ui" class="hidden fixed inset-0 bg-black z-30 flex flex-col">
        <div class="p-6 border-b-4 border-yellow-400 bg-black sticky top-0 flex justify-between items-center">
            <h2 class="text-3xl font-pachinko text-gold">獲得遺伝子</h2>
            <button onclick="backToMain()" class="px-8 py-3 bg-red-800 border border-red-500 rounded-xl">帰還</button>
        </div>
        <div id="result-scroll-area" class="flex-1 overflow-y-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <script>
        // Audio
        class SoundEngine {
            constructor() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            play(type) {
                const now = this.ctx.currentTime;
                if (type === 'tap') {
                    const o = this.ctx.createOscillator(); o.type='square'; o.frequency.setValueAtTime(600,now);
                    const g = this.ctx.createGain(); g.gain.value=0.3; g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
                    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(now+0.15);
                }
                if (type === 'spin') {
                    const o = this.ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(1200,now);
                    o.frequency.exponentialRampToValueAtTime(400,now+0.08);
                    const g = this.ctx.createGain(); g.gain.value=0.2; g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
                    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(now+0.12);
                }
                if (type === 'puchun') {
                    const o = this.ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(2800,now);
                    const g = this.ctx.createGain(); g.gain.value=0.6; g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
                    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(now+0.25);
                }
                if (type === 'revival') {
                    // Heavy bass + rising
                    const bass = this.ctx.createOscillator(); bass.type='sine'; bass.frequency.setValueAtTime(40,now);
                    const bg = this.ctx.createGain(); bg.gain.value=1.2; bg.gain.exponentialRampToValueAtTime(0.001,now+1.8);
                    bass.connect(bg).connect(this.ctx.destination); bass.start(); bass.stop(now+1.8);
                    
                    for(let i=0;i<12;i++){
                        setTimeout(()=>{ 
                            const o = this.ctx.createOscillator(); o.type='square';
                            o.frequency.setValueAtTime(800+Math.random()*2400, now+i*0.07);
                            const g = this.ctx.createGain(); g.gain.value=0.4;
                            g.gain.exponentialRampToValueAtTime(0.001,now+i*0.07+0.12);
                            o.connect(g).connect(this.ctx.destination); o.start(); o.stop(now+i*0.07+0.12);
                        },i*40);
                    }
                }
            }
        }
        const sound = new SoundEngine();

        // Particle System (超強化)
        const canvas = document.getElementById('particle-canvas');
        const c = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(x,y,color,size=6) {
                this.x = x; this.y = y;
                this.vx = (Math.random()-0.5)*18;
                this.vy = (Math.random()-0.5)*18 - 6;
                this.life = 65 + Math.random()*45;
                this.color = color;
                this.size = size;
                this.gravity = 0.28;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += this.gravity;
                this.life--; this.size *= 0.975;
            }
            draw() {
                c.globalAlpha = this.life/90;
                c.fillStyle = this.color;
                c.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function massiveExplosion(x, y, power = 3) {
            canvas.classList.remove('hidden');
            const colors = ['#ff0','#ff4500','#ffff00','#ff1493','#00ffff','#ffd700'];
            for(let i=0; i<120*power; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random()*colors.length)], 5+Math.random()*9));
            }
            requestAnimationFrame(animateParticles);
        }

        function animateParticles() {
            c.clearRect(0,0,canvas.width,canvas.height);
            for(let i=particles.length-1; i>=0; i--) {
                particles[i].update();
                particles[i].draw();
                if(particles[i].life <= 0) particles.splice(i,1);
            }
            if(particles.length > 0) requestAnimationFrame(animateParticles);
            else canvas.classList.add('hidden');
        }

        // Data & Logic
        const prefixes = ["常にイライラしている","世間体を異常に気にする","自己肯定感が異常に低い","他人に極めて厳しい","金銭感覚が崩壊した","過剰に干渉してくる","比較的穏やかな","常識的で落ち着いた","真面目で几帳面な","教育熱心で行儀の良い","精神的に自立した","経済観念がしっかりした","資産が豊富で余裕のある","社会的地位が高い","人徳が極めて高い","カリスマ性に溢れる","不動産を多数所有する"];
        const suffixes = ["サラリーマン","地方公務員","無職","自営業者","派遣社員","工場作業員","YouTuber","投資家","医師","弁護士","大学教授","大家さん","ビルオーナー","資産管理会社代表"];

        const probData = [
            {k:'F',p:0.48,cls:'text-gray-400',rare:false},
            {k:'-N',p:0.12,cls:'text-blue-400',rare:false},
            {k:'N',p:0.18,cls:'text-green-400',rare:false},
            {k:'SR',p:0.15,cls:'text-red-400',rare:false},
            {k:'SSR',p:0.045,cls:'text-yellow-300',rare:true},
            {k:'SSSR',p:0.006,cls:'text-pink-400',rare:true},
            {k:'SSSSSSSR',p:0.002,cls:'text-rainbow',rare:true},
            {k:'大家',p:0.001,cls:'text-rainbow',rare:true}
        ];

        let probTable = [], cum=0;
        probData.forEach(d=>{ cum+=d.p; probTable.push({...d, limit:cum}); });

        let game = {results:[], current:0, skip:false, running:false};

        function gen() {
            const r = Math.random();
            let item = probTable[0];
            for(let t of probTable) if(r < t.limit){ item = t; break; }
            const name = prefixes[Math.floor(Math.random()*prefixes.length)] + " " + suffixes[Math.floor(Math.random()*suffixes.length)];
            return {...item, name};
        }

        async function startDraw(times) {
            if(game.running) return;
            sound.play('tap');
            document.getElementById('main-ui').classList.add('hidden');
            document.getElementById('theater-ui').classList.remove('hidden');
            
            game = {results: Array.from({length:times}, gen), current:0, skip:false, running:true};
            await processQueue();
        }

        async function processQueue() {
            const container = document.getElementById('card-container');
            const rankEl = document.getElementById('card-rank');
            const nameEl = document.getElementById('card-name');
            const counter = document.getElementById('counter-display');
            const strobe = document.getElementById('strobe-layer');
            const flash = document.getElementById('flash-overlay');
            const puchun = document.getElementById('puchun-layer');
            const cutIn = document.getElementById('cut-in-text');
            const lightning = document.getElementById('lightning');

            for(; game.current < game.results.length; game.current++) {
                if(game.skip) break;
                const item = game.results[game.current];
                counter.textContent = `\( {game.current+1}/ \){game.results.length}`;

                // Spin
                container.style.opacity = "0.4";
                for(let i=0; i<(game.results.length>20?3:5); i++) {
                    sound.play('spin');
                    await sleep(35);
                }

                const isRevival = item.rare && Math.random() < 0.55;

                if(isRevival) {
                    rankEl.className = "text-6xl font-pachinko mb-6 text-gray-400";
                    rankEl.textContent = "F";
                    nameEl.textContent = "借金まみれの無職";
                    container.style.opacity = "1";
                    await sleep(650);

                    sound.play('puchun');
                    puchun.style.display = 'block';
                    await sleep(1400);

                    puchun.style.display = 'none';
                    container.classList.add('glitch');
                    rankEl.textContent = "????";
                    await sleep(420);
                    container.classList.remove('glitch');
                }

                // Final reveal
                rankEl.className = `text-6xl font-pachinko mb-6 ${item.cls}`;
                rankEl.textContent = item.k;
                nameEl.textContent = item.name;
                container.style.opacity = "1";

                if(item.rare) {
                    document.body.classList.add('shake-fatal');
                    strobe.className = 'fixed inset-0 bg-white mix-blend-difference opacity-40 z-50 pointer-events-none';
                    sound.play('revival');
                    lightning.classList.remove('hidden');

                    const rect = container.getBoundingClientRect();
                    massiveExplosion(rect.left + rect.width/2, rect.top + rect.height/2, item.k.includes('大家') || item.k.includes('SSSSSSSR') ? 4.5 : 2.8);

                    await sleep(450);
                    document.body.classList.remove('shake-fatal');
                    strobe.className = 'hidden';
                    lightning.classList.add('hidden');

                    flash.style.opacity = '0.9';
                    cutIn.textContent = isRevival ? "奇跡の逆転！！" : (item.k === '大家' ? "伝説の大家降臨！！！" : "超神確定！！！");
                    cutIn.classList.remove('hidden');
                    cutIn.style.color = item.k.includes('大家') ? '#ff0' : '#fff';

                    await sleep(120);
                    flash.style.opacity = '0';
                    await sleep(item.k.includes('大家') || item.k.includes('SSSSSSSR') ? 3800 : 2400);
                    cutIn.classList.add('hidden');
                } else {
                    await sleep(game.results.length > 30 ? 40 : 550);
                }
            }
            finish();
        }

        function finish() {
            document.getElementById('theater-ui').classList.add('hidden');
            const area = document.getElementById('result-scroll-area');
            area.innerHTML = '';
            game.results.forEach((r,i) => {
                const div = document.createElement('div');
                div.className = `p-5 rounded-2xl border ${r.rare ? 'border-yellow-400 bg-black/70 shadow-2xl shadow-yellow-400/30' : 'border-gray-700'}`;
                div.innerHTML = `<span class="text-xs opacity-60">#${i+1}</span><span class="ml-3 px-4 py-1 rounded-full text-sm font-pachinko \( {r.cls}"> \){r.k}</span><div class="mt-3 text-lg font-bold \( {r.rare?'text-gold':''}"> \){r.name}</div>`;
                area.appendChild(div);
            });
            document.getElementById('result-list-ui').classList.remove('hidden');
            game.running = false;
        }

        function skipDraw() { if(game.running) game.skip = true; }
        document.addEventListener('keydown', e => { if(e.code === 'Space') skipDraw(); });

        function backToMain() {
            document.getElementById('result-list-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
